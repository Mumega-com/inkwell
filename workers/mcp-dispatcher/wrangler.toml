name = "mcp-dispatcher"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# ─── KV: Session registry ─────────────────────────────────────────────────────
# Create with: npx wrangler kv:namespace create SESSIONS
# Then paste the returned id below.
[[kv_namespaces]]
binding = "SESSIONS"
id = "YOUR_KV_ID"  # replace after: npx wrangler kv:namespace create SESSIONS

[vars]
# VPS origin — nginx listens on a separate vhost (sos-mcp-origin.mumega.com)
# so the public mcp.mumega.com route isn't recursive.
SOS_ORIGIN = "https://sos-mcp-origin.mumega.com"

[[routes]]
pattern = "mcp.mumega.com/*"
zone_name = "mumega.com"
