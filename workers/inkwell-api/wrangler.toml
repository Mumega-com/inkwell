# ⚠️ Replace all YOUR_* values with your own Cloudflare resources
# See FORK-GUIDE.md for setup instructions
name = "inkwell-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
account_id = "e39eaf94f33092c4efd029d94ae1e9dd"

[vars]
# Set to your domain
SITE_URL = "https://mumega.com"
# SaaS origin for tenant resolution (subdomains → tenant config)
SOS_SAAS_URL = "https://api.mumega.com"
# SOS_BUS_URL, INKWELL_MCP_TOKEN, and GOOGLE_CREDENTIALS are set via wrangler secrets (not vars)
# DataForSEO — optional, enables real keyword research in CampaignWorkflow
DATAFORSEO_LOGIN = ""
DATAFORSEO_PASSWORD = ""
# Google Analytics 4 property ID (numeric, no "properties/" prefix)
GA4_PROPERTY_ID = "532397691"
# Google Search Console site URL (must match exactly what's in GSC)
GSC_SITE_URL = "https://mumega.com/"

[[d1_databases]]
binding = "DB_ANALYTICS"
database_name = "inkwell-analytics"
database_id = "40e442df-13d1-4ce5-a081-491962fe8e59"
migrations_dir = "migrations/analytics"

[[d1_databases]]
binding = "DB_CORE"
database_name = "inkwell-core"
database_id = "abd1fc3e-2bd8-411a-bec8-2686ea9a51f5"
migrations_dir = "migrations/core"

[[d1_databases]]
binding = "DB_MARKETING"
database_name = "inkwell-marketing"
database_id = "e4010c8f-5f61-4c04-aa14-cf42d1afc481"
migrations_dir = "migrations/marketing"

[[d1_databases]]
binding = "DB_CORE"
database_name = "inkwell-core"
database_id = "abd1fc3e-2bd8-411a-bec8-2686ea9a51f5"

[[d1_databases]]
binding = "DB_MARKETING"
database_name = "inkwell-marketing"
database_id = "e4010c8f-5f61-4c04-aa14-cf42d1afc481"

[[kv_namespaces]]
binding = "CONTENT"
id = "c303003bd718427c97f978773fce4f3a"

[[kv_namespaces]]
binding = "SESSIONS"
id = "512331050ea04a35b23843b28af75c2c"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "inkwell-media"

# Audit log archive — create bucket: wrangler r2 bucket create inkwell-logs
[[r2_buckets]]
binding = "LOGS"
bucket_name = "inkwell-logs"

[ai]
binding = "AI"

[[workflows]]
name = "campaign-workflow"
binding = "CAMPAIGN_WORKFLOW"
class_name = "CampaignWorkflow"

[triggers]
crons = ["0 6 * * *", "0 14 * * *", "0 7 * * 1"]

[[routes]]
pattern = "*.mumega.com/*"
zone_name = "mumega.com"

[[routes]]
pattern = "mumega.com/api/*"
zone_name = "mumega.com"
