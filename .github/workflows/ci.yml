name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Kernel tests
        run: cd kernel && npx vitest run

      - name: Worker build (dry-run)
        run: npm run build && cd workers/inkwell-api && npm install && npx wrangler deploy --dry-run --outdir=.wrangler/tmp

  fork-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Fork smoke test
        run: bash scripts/fork-smoke.sh
